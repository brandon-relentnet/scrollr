<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bottom Bar</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 250px;
      background-color: #1e1e2f;
      color: white;
      text-align: center;
      line-height: 250px;
      z-index: 10000;
    }
  </style>
</head>
<body>
  <div class="bottom-bar">Scrollr is ON</div>
</body>
</html>
